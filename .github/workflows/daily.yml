on:
  schedule:
    - cron: '30 23 * * *'  # 对应北京时间 07:30
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Script
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: python main.py
